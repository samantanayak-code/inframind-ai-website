<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="50%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2A6094;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#2A6094;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2A6094;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A6094"/>
      <stop offset="100%" style="stop-color:#1E4D7B"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1260" y1="0" x2="1260" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1320" y1="0" x2="1320" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1380" y1="0" x2="1380" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1440" y1="0" x2="1440" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1500" y1="0" x2="1500" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="1560" y1="0" x2="1560" y2="396" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="0" x2="1584" y2="0" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="60" x2="1584" y2="60" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="120" x2="1584" y2="120" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="180" x2="1584" y2="180" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="240" x2="1584" y2="240" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="300" x2="1584" y2="300" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="360" x2="1584" y2="360" stroke="#FFF" stroke-width="1"/>
  </g>
  
  <!-- Left accent line -->
  <rect x="80" y="80" width="4" height="236" rx="2" fill="url(#blueGrad)"/>
  
  <!-- Blue IM Monogram (large, left side) -->
  <g transform="translate(120, 100) scale(2.5)">
    <rect x="6" y="6" width="5" height="32" rx="1.5" fill="#2A6094"/>
    <rect x="16" y="6" width="5" height="32" rx="1.5" fill="#2A6094"/>
    <path d="M16 6 L24 18 L21.5 18 L16 8" fill="#2A6094"/>
    <path d="M34 6 L24 18 L26.5 18 L34 8" fill="#2A6094"/>
    <rect x="34" y="6" width="5" height="32" rx="1.5" fill="#2A6094"/>
    <rect x="6" y="36" width="33" height="4" rx="1.5" fill="#2A6094"/>
  </g>
  
  <!-- Company Name -->
  <text x="280" y="160" font-weight="700" font-size="56" fill="#D1D5DB" letter-spacing="-1">InfraMind</text>
  <text x="520" y="160" font-weight="700" font-size="56" fill="#2A6094" letter-spacing="-1">AI</text>
  
  <!-- Tagline -->
  <text x="280" y="210" font-weight="300" font-size="22" fill="#9CA3AF" letter-spacing="2">OPERATIONAL INTELLIGENCE FOR INFRASTRUCTURE</text>
  
  <!-- Horizontal divider -->
  <rect x="280" y="235" width="400" height="2" fill="url(#accentGrad)"/>
  
  <!-- Services -->
  <text x="280" y="280" font-weight="600" font-size="16" fill="#2A6094">Digital Twins</text>
  <circle cx="400" cy="275" r="3" fill="#2A6094" opacity="0.5"/>
  <text x="420" y="280" font-weight="600" font-size="16" fill="#2A6094">Contract Intelligence</text>
  <circle cx="600" cy="275" r="3" fill="#2A6094" opacity="0.5"/>
  <text x="620" y="280" font-weight="600" font-size="16" fill="#2A6094">Planning &amp; Scheduling</text>
  <circle cx="830" cy="275" r="3" fill="#2A6094" opacity="0.5"/>
  <text x="850" y="280" font-weight="600" font-size="16" fill="#2A6094">Delay Analysis &amp; EOT</text>
  
  <!-- Website -->
  <text x="280" y="330" font-weight="400" font-size="14" fill="#6B7280">inframind-ai-website.vercel.app</text>
  
  <!-- Right side decorative element -->
  <g opacity="0.15">
    <circle cx="1400" cy="198" r="120" fill="none" stroke="#2A6094" stroke-width="1"/>
    <circle cx="1400" cy="198" r="80" fill="none" stroke="#2A6094" stroke-width="1"/>
    <circle cx="1400" cy="198" r="40" fill="none" stroke="#2A6094" stroke-width="1"/>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="0" y="386" width="1584" height="10" fill="#2A6094" opacity="0.8"/>
</svg>