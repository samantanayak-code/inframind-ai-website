<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700');
      text { font-family: 'Inter', sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-weight="700" font-size="22" fill="#D1D5DB">NCR Workflow Diagram</text>
  <text x="400" y="55" text-anchor="middle" font-weight="400" font-size="12" fill="#9CA3AF">Non-Conformance Report Lifecycle — 6-Stage Process</text>
  
  <!-- Blue IM Monogram -->
  <g transform="translate(720, 10) scale(0.4)">
    <rect x="6" y="6" width="4" height="28" rx="1" fill="#2A6094"/>
    <rect x="14" y="6" width="4" height="28" rx="1" fill="#2A6094"/>
    <path d="M14 6 L20 16 L18 16 L14 8" fill="#2A6094"/>
    <path d="M26 6 L20 16 L22 16 L26 8" fill="#2A6094"/>
    <rect x="26" y="6" width="4" height="28" rx="1" fill="#2A6094"/>
    <rect x="6" y="32" width="24" height="3" rx="1" fill="#2A6094"/>
  </g>
  
  <!-- Stage 1: Site Observation -->
  <rect x="40" y="80" width="140" height="100" rx="8" fill="#2A6094" fill-opacity="0.15" stroke="#2A6094" stroke-width="2"/>
  <circle cx="110" cy="100" r="12" fill="#2A6094"/>
  <text x="110" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">1</text>
  <text x="110" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#2A6094">Site Observation</text>
  <text x="110" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">Quality concern</text>
  <text x="110" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">identified on-site</text>
  <text x="110" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">Pre-NCR logging</text>
  
  <!-- Arrow 1->2 -->
  <line x1="180" y1="130" x2="200" y2="130" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="195,125 205,130 195,135" fill="#9CA3AF"/>
  
  <!-- Stage 2: NCR Initiation -->
  <rect x="200" y="80" width="140" height="100" rx="8" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-width="2"/>
  <circle cx="270" cy="100" r="12" fill="#06B6D4"/>
  <text x="270" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">2</text>
  <text x="270" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#06B6D4">NCR Initiation</text>
  <text x="270" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">Formal NCR created</text>
  <text x="270" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">with LLM categorization</text>
  <text x="270" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">AI-assisted</text>
  
  <!-- Arrow 2->3 -->
  <line x1="340" y1="130" x2="360" y2="130" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="355,125 365,130 355,135" fill="#9CA3AF"/>
  
  <!-- Stage 3: Assessment -->
  <rect x="360" y="80" width="140" height="100" rx="8" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="2"/>
  <circle cx="430" cy="100" r="12" fill="#10B981"/>
  <text x="430" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">3</text>
  <text x="430" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#10B981">Assessment</text>
  <text x="430" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">Severity & impact</text>
  <text x="430" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">evaluation</text>
  <text x="430" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">Criticality scoring</text>
  
  <!-- Arrow 3->4 -->
  <line x1="500" y1="130" x2="520" y2="130" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="515,125 525,130 515,135" fill="#9CA3AF"/>
  
  <!-- Stage 4: Corrective Action -->
  <rect x="520" y="80" width="140" height="100" rx="8" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="590" cy="100" r="12" fill="#8B5CF6"/>
  <text x="590" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">4</text>
  <text x="590" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#8B5CF6">Corrective Action</text>
  <text x="590" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">CAR issued &</text>
  <text x="590" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">action plan defined</text>
  <text x="590" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">Formal submission</text>
  
  <!-- Arrow 4->5 -->
  <line x1="660" y1="130" x2="680" y2="130" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="675,125 685,130 675,135" fill="#9CA3AF"/>
  
  <!-- Stage 5: Verification -->
  <rect x="680" y="80" width="100" height="100" rx="8" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="730" cy="100" r="12" fill="#F59E0B"/>
  <text x="730" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">5</text>
  <text x="730" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#F59E0B">Verify</text>
  <text x="730" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">Effectiveness</text>
  <text x="730" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">check</text>
  <text x="730" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">Audit trail</text>
  
  <!-- Stage 6: Closure -->
  <rect x="300" y="220" width="200" height="80" rx="8" fill="#EC4899" fill-opacity="0.15" stroke="#EC4899" stroke-width="2"/>
  <circle cx="400" cy="240" r="12" fill="#EC4899"/>
  <text x="400" y="245" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">6</text>
  <text x="400" y="270" text-anchor="middle" font-weight="600" font-size="12" fill="#EC4899">NCR Closure</text>
  <text x="400" y="288" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">Final documentation & audit trail</text>
  
  <!-- Arrow 5->6 -->
  <line x1="730" y1="180" x2="500" y2="240" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- Arrow from stages to closure -->
  <line x1="400" y1="180" x2="400" y2="220" stroke="#EC4899" stroke-width="1.5"/>
  
  <!-- Escalation Engine -->
  <rect x="40" y="320" width="720" height="60" rx="8" fill="#2A6094" fill-opacity="0.08" stroke="#2A6094" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="60" y="345" font-weight="600" font-size="12" fill="#2A6094">Tiered Escalation Engine</text>
  <text x="60" y="365" font-weight="400" font-size="10" fill="#D1D5DB">7-Day Warning → 3-Day Alert → 1-Day Critical — Automated notifications ensure no NCR falls through the cracks</text>
  
  <!-- Pattern Detection -->
  <rect x="40" y="395" width="350" height="50" rx="6" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="1"/>
  <text x="60" y="418" font-weight="600" font-size="11" fill="#06B6D4">Pattern Detection</text>
  <text x="60" y="435" font-weight="400" font-size="9" fill="#D1D5DB">Identifies systemic quality issues across NCRs</text>
  
  <!-- Audit Trail -->
  <rect x="410" y="395" width="350" height="50" rx="6" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <text x="430" y="418" font-weight="600" font-size="11" fill="#10B981">Timestamp-Governed Audit Trail</text>
  <text x="430" y="435" font-weight="400" font-size="9" fill="#D1D5DB">Structured documentation aligned with contractual requirements</text>
  
  <!-- Bottom Brand -->
  <text x="400" y="480" text-anchor="middle" font-weight="400" font-size="9" fill="#2A6094">InfraMind AI — AI-Enabled EPC Operational Intelligence</text>
</svg>