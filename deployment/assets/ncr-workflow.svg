<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700');
      text { font-family: 'Inter', sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2128"/>
      <stop offset="100%" style="stop-color:#14171C"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-weight="700" font-size="22" fill="#D0D3D8">NCR Workflow Diagram</text>
  <text x="400" y="55" text-anchor="middle" font-weight="400" font-size="12" fill="#8A8D95">Non-Conformance Report Lifecycle — 6-Stage Process</text>
  
  <!-- Infrastructure Nexus Mark -->
  <g transform="translate(720, 10) scale(0.4)">
    <line x1="8" y1="8" x2="8" y2="48" stroke="#C45A27" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="8" x2="24" y2="48" stroke="#C45A27" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="48" x2="40" y2="48" stroke="#C45A27" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="28" x2="40" y2="28" stroke="#C45A27" stroke-width="2" stroke-linecap="round"/>
    <circle cx="8" cy="8" r="4" fill="#C45A27"/>
    <circle cx="8" cy="48" r="4" fill="#C45A27"/>
    <circle cx="40" cy="8" r="4" fill="#C45A27"/>
    <circle cx="24" cy="48" r="4" fill="#C45A27"/>
    <circle cx="8" cy="28" r="3" fill="#C45A27"/>
    <circle cx="40" cy="28" r="3" fill="#C45A27"/>
  </g>
  
  <!-- Stage 1: Site Observation -->
  <rect x="40" y="80" width="140" height="100" rx="8" fill="#C45A27" fill-opacity="0.15" stroke="#C45A27" stroke-width="2"/>
  <circle cx="110" cy="100" r="12" fill="#C45A27"/>
  <text x="110" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">1</text>
  <text x="110" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#C45A27">Site Observation</text>
  <text x="110" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">Quality concern</text>
  <text x="110" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">identified on-site</text>
  <text x="110" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">Pre-NCR logging</text>
  
  <!-- Arrow 1->2 -->
  <line x1="180" y1="130" x2="200" y2="130" stroke="#8A8D95" stroke-width="2"/>
  <polygon points="195,125 205,130 195,135" fill="#8A8D95"/>
  
  <!-- Stage 2: NCR Initiation -->
  <rect x="200" y="80" width="140" height="100" rx="8" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-width="2"/>
  <circle cx="270" cy="100" r="12" fill="#06B6D4"/>
  <text x="270" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">2</text>
  <text x="270" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#06B6D4">NCR Initiation</text>
  <text x="270" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">Formal NCR created</text>
  <text x="270" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">with LLM categorization</text>
  <text x="270" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">AI-assisted</text>
  
  <!-- Arrow 2->3 -->
  <line x1="340" y1="130" x2="360" y2="130" stroke="#8A8D95" stroke-width="2"/>
  <polygon points="355,125 365,130 355,135" fill="#8A8D95"/>
  
  <!-- Stage 3: Assessment -->
  <rect x="360" y="80" width="140" height="100" rx="8" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="2"/>
  <circle cx="430" cy="100" r="12" fill="#10B981"/>
  <text x="430" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">3</text>
  <text x="430" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#10B981">Assessment</text>
  <text x="430" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">Severity & impact</text>
  <text x="430" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">evaluation</text>
  <text x="430" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">Criticality scoring</text>
  
  <!-- Arrow 3->4 -->
  <line x1="500" y1="130" x2="520" y2="130" stroke="#8A8D95" stroke-width="2"/>
  <polygon points="515,125 525,130 515,135" fill="#8A8D95"/>
  
  <!-- Stage 4: Corrective Action -->
  <rect x="520" y="80" width="140" height="100" rx="8" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="590" cy="100" r="12" fill="#8B5CF6"/>
  <text x="590" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">4</text>
  <text x="590" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#8B5CF6">Corrective Action</text>
  <text x="590" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">CAR issued &</text>
  <text x="590" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">action plan defined</text>
  <text x="590" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">Formal submission</text>
  
  <!-- Arrow 4->5 -->
  <line x1="660" y1="130" x2="680" y2="130" stroke="#8A8D95" stroke-width="2"/>
  <polygon points="675,125 685,130 675,135" fill="#8A8D95"/>
  
  <!-- Stage 5: Verification -->
  <rect x="680" y="80" width="100" height="100" rx="8" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="730" cy="100" r="12" fill="#F59E0B"/>
  <text x="730" y="105" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">5</text>
  <text x="730" y="130" text-anchor="middle" font-weight="600" font-size="11" fill="#F59E0B">Verify</text>
  <text x="730" y="148" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">Effectiveness</text>
  <text x="730" y="162" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">check</text>
  <text x="730" y="178" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">Audit trail</text>
  
  <!-- Stage 6: Closure -->
  <rect x="300" y="220" width="200" height="80" rx="8" fill="#EC4899" fill-opacity="0.15" stroke="#EC4899" stroke-width="2"/>
  <circle cx="400" cy="240" r="12" fill="#EC4899"/>
  <text x="400" y="245" text-anchor="middle" font-weight="700" font-size="12" fill="#FFF">6</text>
  <text x="400" y="270" text-anchor="middle" font-weight="600" font-size="12" fill="#EC4899">NCR Closure</text>
  <text x="400" y="288" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">Final documentation & audit trail</text>
  
  <!-- Arrow 5->6 -->
  <line x1="730" y1="180" x2="500" y2="240" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- Arrow from stages to closure -->
  <line x1="400" y1="180" x2="400" y2="220" stroke="#EC4899" stroke-width="1.5"/>
  
  <!-- Escalation Engine -->
  <rect x="40" y="320" width="720" height="60" rx="8" fill="#C45A27" fill-opacity="0.08" stroke="#C45A27" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="60" y="345" font-weight="600" font-size="12" fill="#C45A27">Tiered Escalation Engine</text>
  <text x="60" y="365" font-weight="400" font-size="10" fill="#D0D3D8">7-Day Warning → 3-Day Alert → 1-Day Critical — Automated notifications ensure no NCR falls through the cracks</text>
  
  <!-- Pattern Detection -->
  <rect x="40" y="395" width="350" height="50" rx="6" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="1"/>
  <text x="60" y="418" font-weight="600" font-size="11" fill="#06B6D4">Pattern Detection</text>
  <text x="60" y="435" font-weight="400" font-size="9" fill="#D0D3D8">Identifies systemic quality issues across NCRs</text>
  
  <!-- Audit Trail -->
  <rect x="410" y="395" width="350" height="50" rx="6" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <text x="430" y="418" font-weight="600" font-size="11" fill="#10B981">Timestamp-Governed Audit Trail</text>
  <text x="430" y="435" font-weight="400" font-size="9" fill="#D0D3D8">Defensible contemporaneous records</text>
  
  <!-- Bottom Brand -->
  <text x="400" y="480" text-anchor="middle" font-weight="400" font-size="9" fill="#C45A27">InfraMind AI — AI-Enabled EPC Operational Intelligence</text>
</svg>