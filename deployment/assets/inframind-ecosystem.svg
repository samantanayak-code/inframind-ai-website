<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700');
      text { font-family: 'Inter', sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A6094;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="550" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-weight="700" font-size="22" fill="#D1D5DB">InfraMind AI Ecosystem</text>
  <text x="400" y="55" text-anchor="middle" font-weight="400" font-size="12" fill="#9CA3AF">Integrated Operational Intelligence for EPC Megaprojects</text>
  
  <!-- Blue IM Monogram -->
  <g transform="translate(720, 10) scale(0.4)">
    <rect x="6" y="6" width="4" height="28" rx="1" fill="#2A6094"/>
    <rect x="14" y="6" width="4" height="28" rx="1" fill="#2A6094"/>
    <path d="M14 6 L20 16 L18 16 L14 8" fill="#2A6094"/>
    <path d="M26 6 L20 16 L22 16 L26 8" fill="#2A6094"/>
    <rect x="26" y="6" width="4" height="28" rx="1" fill="#2A6094"/>
    <rect x="6" y="32" width="24" height="3" rx="1" fill="#2A6094"/>
  </g>
  
  <!-- Outer Ring -->
  <circle cx="400" cy="280" r="210" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="400" cy="280" r="165" fill="none" stroke="#2A6094" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="400" cy="280" r="120" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.2"/>
  
  <!-- Central Hub -->
  <circle cx="400" cy="280" r="65" fill="#2A6094" fill-opacity="0.2" stroke="#2A6094" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" font-weight="700" font-size="16" fill="#2A6094">InfraMind</text>
  <text x="400" y="285" text-anchor="middle" font-weight="700" font-size="16" fill="#2A6094">AI Hub</text>
  <text x="400" y="305" text-anchor="middle" font-weight="400" font-size="9" fill="#D1D5DB">Compound Intelligence</text>
  
  <!-- Product Nodes (Positioned around the hub) -->
  <!-- Top: OCR Intelligence -->
  <circle cx="400" cy="110" r="45" fill="#2A6094" fill-opacity="0.15" stroke="#2A6094" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" font-weight="600" font-size="10" fill="#2A6094">OCR</text>
  <text x="400" y="120" text-anchor="middle" font-weight="600" font-size="10" fill="#2A6094">Intelligence</text>
  <text x="400" y="138" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">98%+ Accuracy</text>
  <line x1="400" y1="155" x2="400" y2="215" stroke="#2A6094" stroke-width="1.5"/>
  
  <!-- Right: Digital Twin -->
  <circle cx="600" cy="200" r="45" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="600" y="195" text-anchor="middle" font-weight="600" font-size="10" fill="#06B6D4">Digital</text>
  <text x="600" y="210" text-anchor="middle" font-weight="600" font-size="10" fill="#06B6D4">Twin</text>
  <text x="600" y="228" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">13 Modules</text>
  <line x1="555" y1="220" x2="465" y2="265" stroke="#06B6D4" stroke-width="1.5"/>
  
  <!-- Bottom-Right: Contract Forensics -->
  <circle cx="560" cy="400" r="45" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="560" y="395" text-anchor="middle" font-weight="600" font-size="10" fill="#8B5CF6">Contract</text>
  <text x="560" y="410" text-anchor="middle" font-weight="600" font-size="10" fill="#8B5CF6">Forensics</text>
  <text x="560" y="428" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">Weeks → Hours</text>
  <line x1="520" y1="380" x2="445" y2="325" stroke="#8B5CF6" stroke-width="1.5"/>
  
  <!-- Bottom-Left: NCR Tracker -->
  <circle cx="240" cy="400" r="45" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="240" y="395" text-anchor="middle" font-weight="600" font-size="10" fill="#10B981">NCR</text>
  <text x="240" y="410" text-anchor="middle" font-weight="600" font-size="10" fill="#10B981">Tracker</text>
  <text x="240" y="428" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">40%+ Faster</text>
  <line x1="280" y1="380" x2="355" y2="325" stroke="#10B981" stroke-width="1.5"/>
  
  <!-- Left: Services Ring -->
  <circle cx="200" cy="200" r="45" fill="#EC4899" fill-opacity="0.15" stroke="#EC4899" stroke-width="1.5"/>
  <text x="200" y="195" text-anchor="middle" font-weight="600" font-size="10" fill="#EC4899">EPC</text>
  <text x="200" y="210" text-anchor="middle" font-weight="600" font-size="10" fill="#EC4899">Services</text>
  <text x="200" y="228" text-anchor="middle" font-weight="400" font-size="8" fill="#9CA3AF">6 Offerings</text>
  <line x1="245" y1="220" x2="335" y2="265" stroke="#EC4899" stroke-width="1.5"/>
  
  <!-- Cross-connections (dashed) -->
  <line x1="400" y1="155" x2="555" y2="180" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="600" y1="245" x2="560" y2="355" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="515" y1="420" x2="445" y2="435" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="355" y1="435" x2="285" y2="420" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="200" y1="245" x2="240" y2="355" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="245" y1="180" x2="345" y2="155" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  
  <!-- Legend -->
  <rect x="40" y="490" width="720" height="40" rx="6" fill="#111827" stroke="#2A6094" stroke-width="1"/>
  <circle cx="80" cy="510" r="6" fill="#2A6094"/>
  <text x="95" y="514" font-weight="400" font-size="9" fill="#D1D5DB">Data Capture</text>
  <circle cx="200" cy="510" r="6" fill="#06B6D4"/>
  <text x="215" y="514" font-weight="400" font-size="9" fill="#D1D5DB">Intelligence</text>
  <circle cx="310" cy="510" r="6" fill="#8B5CF6"/>
  <text x="325" y="514" font-weight="400" font-size="9" fill="#D1D5DB">Decision</text>
  <circle cx="400" cy="510" r="6" fill="#10B981"/>
  <text x="415" y="514" font-weight="400" font-size="9" fill="#D1D5DB">Quality</text>
  <circle cx="490" cy="510" r="6" fill="#EC4899"/>
  <text x="505" y="514" font-weight="400" font-size="9" fill="#D1D5DB">Services</text>
  
  <!-- Bottom Brand -->
  <text x="400" y="545" text-anchor="middle" font-weight="400" font-size="9" fill="#2A6094">InfraMind AI — AI-Enabled EPC Operational Intelligence</text>
</svg>