<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700');
      text { font-family: 'Inter', sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2128"/>
      <stop offset="100%" style="stop-color:#14171C"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C45A27;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-weight="700" font-size="22" fill="#D0D3D8">InfraMind AI Ecosystem</text>
  <text x="400" y="55" text-anchor="middle" font-weight="400" font-size="12" fill="#8A8D95">Integrated Operational Intelligence for EPC Megaprojects</text>
  
  <!-- Infrastructure Nexus Mark -->
  <g transform="translate(720, 10) scale(0.4)">
    <line x1="8" y1="8" x2="8" y2="48" stroke="#C45A27" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="8" x2="24" y2="48" stroke="#C45A27" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="48" x2="40" y2="48" stroke="#C45A27" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="28" x2="40" y2="28" stroke="#C45A27" stroke-width="2" stroke-linecap="round"/>
    <circle cx="8" cy="8" r="4" fill="#C45A27"/>
    <circle cx="8" cy="48" r="4" fill="#C45A27"/>
    <circle cx="40" cy="8" r="4" fill="#C45A27"/>
    <circle cx="24" cy="48" r="4" fill="#C45A27"/>
    <circle cx="8" cy="28" r="3" fill="#C45A27"/>
    <circle cx="40" cy="28" r="3" fill="#C45A27"/>
  </g>
  
  <!-- Outer Ring -->
  <circle cx="400" cy="300" r="230" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="400" cy="300" r="180" fill="none" stroke="#C45A27" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="400" cy="300" r="130" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.2"/>
  
  <!-- Central Hub -->
  <circle cx="400" cy="300" r="70" fill="#C45A27" fill-opacity="0.2" stroke="#C45A27" stroke-width="2"/>
  <text x="400" y="285" text-anchor="middle" font-weight="700" font-size="16" fill="#C45A27">InfraMind</text>
  <text x="400" y="305" text-anchor="middle" font-weight="700" font-size="16" fill="#C45A27">AI Hub</text>
  <text x="400" y="325" text-anchor="middle" font-weight="400" font-size="9" fill="#D0D3D8">Compound Intelligence</text>
  
  <!-- Product Nodes (Positioned around the hub) -->
  <!-- Top: OCR Intelligence -->
  <circle cx="400" cy="120" r="45" fill="#C45A27" fill-opacity="0.15" stroke="#C45A27" stroke-width="1.5"/>
  <text x="400" y="115" text-anchor="middle" font-weight="600" font-size="10" fill="#C45A27">OCR</text>
  <text x="400" y="130" text-anchor="middle" font-weight="600" font-size="10" fill="#C45A27">Intelligence</text>
  <text x="400" y="148" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">98%+ Accuracy</text>
  <line x1="400" y1="165" x2="400" y2="230" stroke="#C45A27" stroke-width="1.5"/>
  
  <!-- Right: Digital Twin -->
  <circle cx="620" cy="220" r="45" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="620" y="215" text-anchor="middle" font-weight="600" font-size="10" fill="#06B6D4">Digital</text>
  <text x="620" y="230" text-anchor="middle" font-weight="600" font-size="10" fill="#06B6D4">Twin</text>
  <text x="620" y="248" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">13 Modules</text>
  <line x1="575" y1="240" x2="470" y2="285" stroke="#06B6D4" stroke-width="1.5"/>
  
  <!-- Bottom-Right: Contract Forensics -->
  <circle cx="580" cy="420" r="45" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="580" y="415" text-anchor="middle" font-weight="600" font-size="10" fill="#8B5CF6">Contract</text>
  <text x="580" y="430" text-anchor="middle" font-weight="600" font-size="10" fill="#8B5CF6">Forensics</text>
  <text x="580" y="448" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">Weeks → Hours</text>
  <line x1="540" y1="400" x2="445" y2="340" stroke="#8B5CF6" stroke-width="1.5"/>
  
  <!-- Bottom: TCB Simulation -->
  <circle cx="400" cy="480" r="45" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="400" y="475" text-anchor="middle" font-weight="600" font-size="10" fill="#F59E0B">TCB</text>
  <text x="400" y="490" text-anchor="middle" font-weight="600" font-size="10" fill="#F59E0B">Simulation</text>
  <text x="400" y="508" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">Time-Cost-Buffer</text>
  <line x1="400" y1="435" x2="400" y2="370" stroke="#F59E0B" stroke-width="1.5"/>
  
  <!-- Bottom-Left: NCR Tracker -->
  <circle cx="220" cy="420" r="45" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="220" y="415" text-anchor="middle" font-weight="600" font-size="10" fill="#10B981">NCR</text>
  <text x="220" y="430" text-anchor="middle" font-weight="600" font-size="10" fill="#10B981">Tracker</text>
  <text x="220" y="448" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">40%+ Faster</text>
  <line x1="260" y1="400" x2="355" y2="340" stroke="#10B981" stroke-width="1.5"/>
  
  <!-- Left: Services Ring -->
  <circle cx="180" cy="220" r="45" fill="#EC4899" fill-opacity="0.15" stroke="#EC4899" stroke-width="1.5"/>
  <text x="180" y="215" text-anchor="middle" font-weight="600" font-size="10" fill="#EC4899">EPC</text>
  <text x="180" y="230" text-anchor="middle" font-weight="600" font-size="10" fill="#EC4899">Services</text>
  <text x="180" y="248" text-anchor="middle" font-weight="400" font-size="8" fill="#8A8D95">6 Offerings</text>
  <line x1="225" y1="240" x2="330" y2="285" stroke="#EC4899" stroke-width="1.5"/>
  
  <!-- Cross-connections (dashed) -->
  <line x1="400" y1="165" x2="575" y2="200" stroke="#8A8D95" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="620" y1="265" x2="580" y2="375" stroke="#8A8D95" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="535" y1="440" x2="445" y2="460" stroke="#8A8D95" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="355" y1="460" x2="265" y2="440" stroke="#8A8D95" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="180" y1="265" x2="220" y2="375" stroke="#8A8D95" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="225" y1="200" x2="330" y2="165" stroke="#8A8D95" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  
  <!-- Legend -->
  <rect x="40" y="540" width="720" height="40" rx="6" fill="#1E2128" stroke="#C45A27" stroke-width="1"/>
  <circle cx="80" cy="560" r="6" fill="#C45A27"/>
  <text x="95" y="564" font-weight="400" font-size="9" fill="#D0D3D8">Data Capture</text>
  <circle cx="200" cy="560" r="6" fill="#06B6D4"/>
  <text x="215" y="564" font-weight="400" font-size="9" fill="#D0D3D8">Intelligence</text>
  <circle cx="310" cy="560" r="6" fill="#8B5CF6"/>
  <text x="325" y="564" font-weight="400" font-size="9" fill="#D0D3D8">Decision</text>
  <circle cx="400" cy="560" r="6" fill="#10B981"/>
  <text x="415" y="564" font-weight="400" font-size="9" fill="#D0D3D8">Quality</text>
  <circle cx="480" cy="560" r="6" fill="#F59E0B"/>
  <text x="495" y="564" font-weight="400" font-size="9" fill="#D0D3D8">Evidence</text>
  <circle cx="570" cy="560" r="6" fill="#EC4899"/>
  <text x="585" y="564" font-weight="400" font-size="9" fill="#D0D3D8">Services</text>
  
  <!-- Bottom Brand -->
  <text x="400" y="595" text-anchor="middle" font-weight="400" font-size="9" fill="#C45A27">InfraMind AI — AI-Enabled EPC Operational Intelligence</text>
</svg>