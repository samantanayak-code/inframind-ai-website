<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#1E2128"/>
  
  <!-- Infrastructure Nexus Mark (centered) -->
  <g transform="translate(450, 150)">
    <!-- Left vertical (hidden "I") -->
    <line x1="8" y1="8" x2="8" y2="188" stroke="#C45A27" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Right triangle (hidden "A") -->
    <line x1="148" y1="8" x2="78" y2="188" stroke="#C45A27" stroke-width="6" stroke-linecap="round"/>
    <line x1="78" y1="188" x2="148" y2="188" stroke="#C45A27" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Crossbar (connects "I" and "A") -->
    <line x1="8" y1="98" x2="148" y2="98" stroke="#C45A27" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Intelligence nodes -->
    <circle cx="8" cy="8" r="10" fill="#C45A27"/>
    <circle cx="8" cy="188" r="10" fill="#C45A27"/>
    <circle cx="148" cy="8" r="10" fill="#C45A27"/>
    <circle cx="78" cy="188" r="10" fill="#C45A27"/>
    <circle cx="8" cy="98" r="8" fill="#C45A27"/>
    <circle cx="148" cy="98" r="8" fill="#C45A27"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="48" fill="#D0D3D8">InfraMind AI</text>
  
  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="24" fill="#8A8D95">Digitise. Analyse. Decide.</text>
  
  <!-- Subtitle -->
  <text x="600" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="18" fill="#C45A27">AI-Enabled EPC Operational Intelligence</text>
  
  <!-- Website URL -->
  <text x="600" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="#06B6D4">https://inframind.ai</text>
</svg>
