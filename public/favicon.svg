<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Infrastructure Nexus Mark (simplified for favicon) -->
  <g transform="translate(4, 4)">
    <!-- Left vertical (hidden "I") -->
    <line x1="4" y1="4" x2="4" y2="24" stroke="#C45A27" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Right triangle (hidden "A") -->
    <line x1="20" y1="4" x2="12" y2="24" stroke="#C45A27" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="24" x2="20" y2="24" stroke="#C45A27" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Crossbar (connects "I" and "A") -->
    <line x1="4" y1="14" x2="20" y2="14" stroke="#C45A27" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Intelligence nodes -->
    <circle cx="4" cy="4" r="2.5" fill="#C45A27"/>
    <circle cx="4" cy="24" r="2.5" fill="#C45A27"/>
    <circle cx="20" cy="4" r="2.5" fill="#C45A27"/>
    <circle cx="12" cy="24" r="2.5" fill="#C45A27"/>
    <circle cx="4" cy="14" r="2" fill="#C45A27"/>
    <circle cx="20" cy="14" r="2" fill="#C45A27"/>
  </g>
</svg>
